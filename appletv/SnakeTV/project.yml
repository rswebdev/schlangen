name: SnakeTV
options:
  bundleIdPrefix: com.schlangen
  deploymentTarget:
    tvOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"

targets:
  SnakeTV:
    type: application
    platform: tvOS
    sources:
      - path: "SchlangenTV-tvOS"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schlangen.tv
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: WZ5TKZ8E7A
        INFOPLIST_KEY_CFBundleDisplayName: "Schlangen.TV Server for tvOS"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.arcade-games"
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: "Brand Assets"
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../Frameworks/Mobile-tvOS.xcframework"
          - "$(PROJECT_DIR)/../Frameworks"
        OTHER_LDFLAGS:
          - "-ObjC"
        SWIFT_OBJC_BRIDGING_HEADER: ""
    dependencies:
      - framework: "../Frameworks/Mobile-tvOS.xcframework"
        embed: true

  SchlangenTV-macOS:
    type: application
    platform: macOS
    sources:
      - path: "SchlangenTV-macOS"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.schlangen.tv.macos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: WZ5TKZ8E7A
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Schlangen.TV Server"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.arcade-games"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - "$(PROJECT_DIR)/../Frameworks/macOS/Mobile.xcframework"
          - "$(PROJECT_DIR)/../Frameworks/macOS"
        OTHER_LDFLAGS:
          - "-ObjC"
    dependencies:
      - framework: "../Frameworks/macOS/Mobile.xcframework"
        embed: true
